services:
  app:
    build: .
    container_name: examen-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/examen_db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - red_examen

  db:
    image: postgres:16-alpine
    container_name: examen-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: examen_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - red_examen
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  red_examen:
    driver: bridge